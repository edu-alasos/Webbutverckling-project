<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="front-page.html" class="logo">
            <img src="y9DpT.jpg" alt="" class="logo">
        </a>
        <li>
            <a href="">Checkout</a>
            <a href="/shop.html">Shop</a>
            <a href="">Contact</a>
        </li>
        <img src="y9DpT.jpg" alt="" class="cart">
    </header>

    <div class="cart-div">
        <div class="cart-items">

        </div>

        <div class="cart-checkout">
            <p>Checkout</p>
        </div>
    </div>

    <main>
        <section>
            <div class="side-menu">
                <div class="category">
                    <p>category 1</p>
                </div>
                <div class="category">
                    <p>category 2</p>
                </div>
                <div class="category">
                    <p>category 3</p>
                </div>
                <div class="category">
                    <p>category 4</p>
                </div>
            </div>
        </section>

        <section>
            <div class="products">
                <div class="product">
                    <div class="product-img">
                        <img src="y9DpT.jpg" alt="">
                    </div>
                    <div class="product-info">
                        <div class="name-base">
                            <div class=""></div>
                            <p>item 1</p>
                        </div>
                        <div class="price-base">
                            <p>$50.00</p>
                        </div>
                        <div class="created-base">
                            <span class="created-label">Created by:</span>
                            <span class="created-person">John</span>
                        </div>
                    </div>
                    <div class="add-to-cart">
                        <p>Add to Cart</p>
                    </div>
                </div>

                <div class="product">
                    <div class="product-img">
                        <img src="y9DpT.jpg" alt="">
                    </div>
                    <div class="product-info">
                        <div class="name-base">
                            <div class=""></div>
                            <p>item 2</p>
                        </div>
                        <div class="price-base">
                            <p>$30.00</p>
                        </div>
                        <div class="created-base">
                            <span class="created-label">Created by:</span>
                            <span class="created-person">James</span>
                        </div>
                    </div>
                    <div class="add-to-cart">
                        <p>Add to Cart</p>
                    </div>
                </div>

                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
                <div class="product"></div>
            </div>
        </section>

        <section>
            <div class="filters">
                <form action="">
                    <label for="search-bar">Search:</label>
                    <br>
                    <input class="form" type="text" name="search" id="search-bar" placeholder="...">
                    <br>
                    <br>
                    <label for="minimum-price">Minimum Price:</label>
                    <br>
                    <input class="form" type="text" name="min" id="minimum-price" placeholder="...">
                    <br>
                    <br>
                    <label for="maximum-price">Maximum Price:</label>
                    <br>
                    <input class="form" type="text" name="max" id="maximum-price" placeholder="...">
                    <br>
                    <br>
                    <label for="by-seller">Search by seller:</label>
                    <br>
                    <input class="form" type="text" name="seller" id="by-seller" placeholder="...">
                    <br>
                    <br>
                    <label for="with-shipping">Exclude products without shipping:</label>
                    <input type="checkbox" name="has-shipping" id="with-shipping">
                    <br>
                    <br>
                    <input type="submit">
                </form>
            </div>
        </section>
    </main>

    <section>
        <div class="about"></div>
    </section>
</body>
</html>
<script src="cart.js"></script>
